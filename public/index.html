<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MapShare Companion</title>
  <meta name="theme-color" content="#0b1020" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="MapShare" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main id="setup" class="setup">
    <section class="setup-card">
      <div class="page-title-row">
        <h1>MapShare Companion</h1>
        <a class="donate-link" href="https://ko-fi.com/mapsharecompanion" target="_blank" rel="noopener">Donate</a>
      </div>
      <p>A support-crew map for races and solo tracking.</p>
      <button id="enter-race" class="setup-primary" type="button">Enter Transcapixaba 2026 Race</button>
      <form id="setup-form">
        <input id="map-input" autocomplete="off" inputmode="url" placeholder="Garmin or SPOT link / username" />
        <button type="submit">Track solo</button>
      </form>
      <p class="hint">Examples: <code>share.garmin.com/nhayes</code>, <code>nhayes</code>, or a FindMeSPOT feed ID/link.</p>
      <p id="setup-error" class="setup-error" role="alert"></p>
    </section>
  </main>

  <main id="tracker" class="tracker hidden">
    <header class="top">
      <div>
        <div class="page-title-row compact">
          <div id="app-title" class="title">MapShare Companion</div>
          <a class="donate-link" href="https://ko-fi.com/mapsharecompanion" target="_blank" rel="noopener">Donate</a>
        </div>
        <div id="app-subtitle" class="subtitle"><b id="map-name">—</b></div>
      </div>
      <div class="header-actions">
        <button id="refresh" class="icon-button" type="button" title="Refresh Garmin data" aria-label="Refresh Garmin data">⟳</button>
        <div class="menu-wrap">
          <button id="track-menu-toggle" class="icon-button" type="button" title="Tracker options" aria-label="Tracker options" aria-haspopup="menu" aria-expanded="false">⋮</button>
          <div id="track-menu" class="track-menu hidden" role="menu" aria-label="Tracker options">
            <button id="switch-race" type="button" role="menuitem">Enter race</button>
            <button id="import-kml" type="button" role="menuitem">Import KML</button>
            <button id="toggle-source-features" class="hidden" type="button" role="menuitem">Hide Garmin features</button>
            <button id="change-map" type="button" role="menuitem">Change racer</button>
          </div>
        </div>
      </div>
    </header>

    <section class="stats">
      <div><span>Racer</span><b id="racer-status">loading…</b></div>
      <div><span>Speed</span><b id="speed">—</b></div>
      <div><span>Elev</span><b id="elevation">—</b></div>
      <div><span>Me → Racer</span><b id="range">GPS…</b></div>
    </section>

    <nav class="actions">
      <button id="fit-both" type="button">Fit both</button>
      <button id="center-racer" type="button">Racer</button>
      <button id="center-me" type="button">Me</button>
      <button id="racer-list" class="hidden" type="button">List</button>
      <button id="toggle-basemap" type="button" title="Toggle map type">🗺️ Topo</button>
      <button id="toggle-kml" class="hidden" type="button">Hide KML</button>
      <input id="kml-file" class="hidden" type="file" accept=".kml,application/vnd.google-earth.kml+xml,application/xml,text/xml" />
    </nav>

    <div id="info" class="info">Loading…</div>
    <div id="map"></div>
    <aside id="racer-list-panel" class="racer-list-panel hidden" aria-label="Racers list">
      <div class="racer-list-head">
        <div><b>Racers</b><span id="racer-list-summary">—</span></div>
        <button id="racer-list-close" type="button" aria-label="Close racer list">×</button>
      </div>
      <div class="racer-list-actions">
        <button id="racer-list-follow-all" type="button">Follow all</button>
        <button id="racer-list-clear" type="button">Clear followed</button>
      </div>
      <div id="racer-list-body" class="racer-list-body"></div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://lt.flymaster.net/msgpack.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
